services:
  - type: web
    name: panel-tecnicos
    runtime: python
    repo: https://github.com/elvinluque78-cyber/panel-tecnicos
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
